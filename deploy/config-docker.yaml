# Docker 部署用配置示例
# 将 database.path 设为挂载卷路径，以便持久化 SQLite
# 使用方式: 复制为项目根目录 config.yaml 或挂载到容器 /app/config.yaml

server:
  listen: ":2101"
  admin_listen: ":8080"

auth:
  enabled: true
  admin_mode: session
  ntrip_source_auth: user_binding
  ntrip_rover_auth: basic

database:
  type: sqlite
  path: /app/data/caster.db

limits:
  max_clients: 5000
  max_conn_per_ip: 10

mountpoint_defaults:
  write_queue: 64
  write_timeout: 3s
